# OpenAPI example: User registration endpoint
#
# WHAT: OpenAPI is a machine-readable contract for your REST API —
#       every endpoint, parameter, request body, and response shape.
# WHEN: Define endpoints here before (or alongside) implementing them.
# WHERE: The full file lives at api/openapi.yaml at the project root.
#        Agents read it to understand what routes exist and what they accept,
#        so they don't guess endpoint names or invent request fields.
#
# This file shows a single endpoint. Your full openapi.yaml will have many paths.

openapi: '3.0.0'
info:
  title: My API
  version: '1.0.0'

paths:
  /users:
    post:
      summary: Register a new user
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  minLength: 8
                  example: s3cur3p@ss
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  email: { type: string }
        '400': { description: Validation error (e.g. password too short) }
        '409': { description: Email already registered }
